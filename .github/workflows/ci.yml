name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - ".claude/**"
      - "docs/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - ".claude/**"
      - "docs/**"
  pull_request_target:
    branches: [main]
    paths-ignore:
      - ".claude/**"
      - "docs/**"

jobs:
  file-placement:
    name: Enforce test file placement
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Reject lefthook test files outside src/
        run: |
          misplaced=$(find . -name "lefthook*.test.ts" \
            -not -path "./src/*" \
            -not -path "./node_modules/*")
          if [ -n "$misplaced" ]; then
            echo "ERROR: lefthook e2e test files found outside src/:"
            echo "$misplaced"
            echo ""
            echo "Move them to src/ — see src/lefthook-e2e.test.ts for canonical location."
            exit 1
          fi
          echo "OK: all lefthook test files are under src/"

  workflow-permissions:
    name: Block workflow permission escalation
    if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Check for permissions changes in workflow files
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          bun scripts/check-workflow-permissions.ts --base "origin/$BASE_REF"

  ci:
    runs-on: ubuntu-latest
    # Full `bun test --concurrent` often exceeds 15m on ubuntu-latest (step gets cancelled, not failed).
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        env:
          LEFTHOOK: 0

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Determine test scope
        id: test-scope
        env:
          # Base sha for the scope diff: previous push head (`push` event)
          # or PR base (`pull_request`). Consumed by resolveBase() in
          # scripts/get-test-scope.ts. Empty/zero-sha falls back to
          # origin/main → HEAD~4 inside the script.
          CI_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          # Delegate to the same scope script lefthook uses so the two
          # gates never drift. The script prints a space-separated list of
          # test files when it finds a targeted scope, or empty when the
          # diff is too broad / too narrow to target — in which case CI
          # runs the full suite.
          TARGETED=$(bun run scripts/get-test-scope.ts)
          echo "CI_BASE: $CI_BASE"
          echo "Targeted: $TARGETED"
          if [ -n "$TARGETED" ]; then
            echo "scope=targeted" >> "$GITHUB_OUTPUT"
            echo "test_files=$TARGETED" >> "$GITHUB_OUTPUT"
            echo "→ Running targeted tests only"
          else
            echo "scope=full" >> "$GITHUB_OUTPUT"
            echo "→ Running full test suite"
          fi

      - name: Test
        env:
          SWIZ_NO_DAEMON: "1"
        run: |
          if [ "${{ steps.test-scope.outputs.scope }}" = "full" ]; then
            echo "Running full test suite"
            bun test --concurrent --timeout=60000
          else
            echo "Running targeted tests: ${{ steps.test-scope.outputs.test_files }}"
            bun test --concurrent --timeout=60000 ${{ steps.test-scope.outputs.test_files }}
          fi
