fail: exit_code
skip:
  - merge
  - rebase

pre-commit:
  commands:
    disk-space:
      priority: 1
      run: bun scripts/check-disk-space.ts
      skip:
        - merge
        - rebase
    # lint-staged fixes staged files; `bun run lint` verifies the whole tree (same as CI).
    lint:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs,json}"
      run: bunx lint-staged && bun run lint
      stage_fixed: true
      skip:
        - merge
        - rebase
    typecheck:
      glob: "*.ts"
      run: bunx tsc --noEmit
      skip:
        - merge
        - rebase
    similar:
      run: command -v resect >/dev/null 2>&1 || exit 0; resect similar . --threshold=0.96 --strict --skip-same-file --same-name-only --min-lines=12
      skip:
        - merge
        - rebase
    memory:
      run: swiz memory --strict
      skip:
        - merge
        - rebase
    swiz-precommit:
      run: echo '{"cwd":"'$(pwd)'"}' | SWIZ_DIRECT=1 bun run index.ts dispatch preCommit
      skip:
        - merge
        - rebase

pre-push:
  commands:
    disk-space:
      priority: 1
      run: bun scripts/check-disk-space.ts
      skip:
        - merge
        - rebase
    test:
      glob: "*.{ts,tsx,js,jsx,json}"
      run: timeout 120 bun test --concurrent --timeout=10000 --max-concurrency=8 $(git ls-files '*.test.ts' | grep -v -e stop-auto-continue -e 'commands/dispatch\.test' -e 'commands/dispatch-formats\.test' -e 'commands/cleanup\.test' -e 'commands/skill\.test' -e 'commands/status\.test' -e 'stop-personal-repo-issues-e2e' -e 'stop-secret-scanner' -e 'commands/state\.test' -e 'commands/compact\.test' -e 'commands/doctor\.test' -e 'positive-path-integration' -e 'commands/manage\.test' -e 'commands/tasks\.test' -e 'commands/issue\.test' -e 'transcript-session-gemini' -e 'commands/settings\.test' -e 'commands/ci-wait\.test' -e 'commands/daemon\.test' -e 'commands/memory\.test' -e 'commands/reflect\.test' -e 'commands/usage\.test' -e 'commands/idea\.test' | tr '\n' ' ')
      skip:
        - merge
        - rebase
