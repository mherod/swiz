fail: exit_code
skip:
  - merge
  - rebase

pre-commit:
  commands:
    disk-space:
      priority: 1
      run: bun scripts/check-disk-space.ts
      skip:
        - merge
        - rebase
    lint:
      glob: "*.{ts,tsx,js,jsx,json}"
      run: bunx lint-staged
      stage_fixed: true
      skip:
        - merge
        - rebase
    typecheck:
      glob: "*.ts"
      run: bunx tsc --noEmit
      skip:
        - merge
        - rebase
    memory:
      run: swiz memory --strict
      skip:
        - merge
        - rebase

pre-push:
  commands:
    disk-space:
      priority: 1
      run: bun scripts/check-disk-space.ts
      skip:
        - merge
        - rebase
    test:
      glob: "*.{ts,tsx,js,jsx,json}"
      run: timeout 30 bun test --concurrent --timeout=10000 --max-concurrency=8
      skip:
        - merge
        - rebase
