fail: exit_code
skip:
  - merge
  - rebase

pre-commit:
  commands:
    # lint-staged fixes staged files; `bun run lint` verifies the whole tree (same as CI).
    lint:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs,json}"
      run: bunx lint-staged && bun run lint
      stage_fixed: true
      skip:
        - merge
        - rebase
    typecheck:
      glob: "*.ts"
      run: bunx tsc --noEmit
      skip:
        - merge
        - rebase
    similar:
      run: command -v resect >/dev/null 2>&1 || exit 0; resect similar . --threshold=0.94 --strict --skip-same-file --same-name-only --min-lines=8
      skip:
        - merge
        - rebase
    memory:
      run: SWIZ_DIRECT=1 swiz memory --strict
      skip:
        - merge
        - rebase
    swiz-precommit:
      run: echo '{"cwd":"'$(pwd)'"}' | SWIZ_DIRECT=1 swiz dispatch preCommit
      skip:
        - merge
        - rebase

pre-push:
  commands:
    test:
      glob: "*.{ts,tsx,js,jsx,json}"
      run: |
        TARGETED=$(bun run scripts/get-test-scope.ts)
        if [ -n "$TARGETED" ]; then
          echo "Running targeted tests: $TARGETED"
          timeout 600 bun test --concurrent --timeout=60000 --max-concurrency=8 $TARGETED
        else
          echo "No targeted tests found or scope too broad; running safe subset"
          timeout 600 bun test --concurrent --timeout=60000 --max-concurrency=8 $(git ls-files '*.test.ts' | grep -v -e stop-auto-continue -e 'commands/dispatch\.test' -e 'commands/dispatch-formats\.test' -e 'commands/cleanup\.test' -e 'commands/skill\.test' -e 'commands/status\.test' -e 'stop-personal-repo-issues-e2e' -e 'stop-secret-scanner' -e 'commands/state\.test' -e 'commands/compact\.test' -e 'commands/doctor\.test' -e 'positive-path-integration' -e 'commands/manage\.test' -e 'commands/tasks\.test' -e 'commands/issue\.test' -e 'transcript-session-gemini' -e 'commands/settings\.test' -e 'commands/ci-wait\.test' -e 'commands/daemon\.test' -e 'commands/memory\.test' -e 'commands/reflect\.test' -e 'commands/usage\.test' -e 'commands/idea\.test' -e '\.fuzz\.test' | tr '\n' ' ')
        fi
      skip:
        - merge
        - rebase

commit-msg:
  commands:
    commitlint:
      run: echo '{"cwd":"'$(pwd)'","commit_msg_file":"{1}"}' | SWIZ_DIRECT=1 swiz dispatch commitMsg && bunx commitlint --edit {1}

post-push:
  commands:
    push-ci:
      run: SWIZ_DIRECT=1 swiz push-ci origin main --ci-timeout 600
